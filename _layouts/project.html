---
layout: default
---
<div class="page-head">
  <div class="container">
    <div class="kicker"><a href="{{ '/projects/' | relative_url }}">← Projects</a></div>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
    {% if page.links %}
      <div class="pub-links project-links">
        {% for l in page.links %}<a class="pill" href="{{ l.url }}" rel="noopener">{{ l.label }}</a>{% endfor %}
      </div>
    {% endif %}
  </div>
</div>
{% if page.image %}
  <div class="container"><img class="project-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}" loading="lazy"></div>
{% endif %}
<article class="container page-body">
  <div class="prose">
    {{ content }}
  </div>
</article>
