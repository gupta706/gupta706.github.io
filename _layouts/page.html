---
layout: default
---
<div class="page-head">
  <div class="container">
    {% if page.kicker %}<div class="kicker">{{ page.kicker }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
  </div>
</div>
<div class="container page-body">
  <div class="prose">
    {{ content }}
  </div>
</div>
