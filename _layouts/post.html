---
layout: default
---
<div class="page-head">
  <div class="container">
    <div class="kicker"><a href="{{ '/blog/' | relative_url }}">← Blog</a></div>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} · {{ page.author }}{% endif %}
      {% if page.tags.size > 0 %} · {% for t in page.tags %}<span class="tag-inline">#{{ t }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}{% endif %}
    </p>
  </div>
</div>
<article class="container page-body">
  <div class="prose post-content">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/blog/' | relative_url }}">← All posts</a></p>
</article>
