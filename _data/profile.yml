# --- Full biography (shown on the home "About" section) ----------------------
bio: >-
  Abhishek Gupta is an Associate Professor in the Department of Electrical and
  Computer Engineering at The Ohio State University. He earned his Ph.D. in
  Aerospace Engineering (2014), M.S. in Applied Mathematics (2012), and M.S. in
  Aerospace Engineering (2011) from the University of Illinois at
  Urbana-Champaign (UIUC), following his undergraduate degree in Aerospace
  Engineering from the Indian Institute of Technology Bombay (2005-09). His
  scholarly work spans the frontiers of artificial intelligence, game theory,
  and dynamic optimization, uniting deep theoretical insight with high-impact
  applied innovation. He is a co-author on three patent applications at OSU, two
  of which have been successfully commercialized. In recognition of his
  foundational contributions to stochastic control, he received the Lumley
  Research Award in 2019 from the College of Engineering at The Ohio State
  University.

